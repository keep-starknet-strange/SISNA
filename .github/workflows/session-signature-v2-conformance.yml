name: session-signature-v2-conformance

on:
  pull_request:
    branches:
      - main
    paths:
      - "spec/session-signature-v2.json"
      - "spec/session-signature-v2.schema.json"
      - ".github/workflows/session-signature-v2-conformance.yml"
  push:
    branches:
      - main
    paths:
      - "spec/session-signature-v2.json"
      - "spec/session-signature-v2.schema.json"
      - ".github/workflows/session-signature-v2-conformance.yml"
  workflow_dispatch:
  schedule:
    - cron: "40 4 * * *"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"

      - name: Install AJV CLI
        run: npm install --global ajv-cli@5.0.0

      - name: Validate vector file against schema
        run: |
          ajv validate \
            --spec=draft2020 \
            --strict=true \
            -s spec/session-signature-v2.schema.json \
            -d spec/session-signature-v2.json

      - name: Validate vector invariants
        run: |
          node <<'EOF_JS'
          const fs = require("fs");
          const data = JSON.parse(fs.readFileSync("spec/session-signature-v2.json", "utf8"));

          const outsideIds = new Set();
          for (const vector of data.vectors) {
            if (outsideIds.has(vector.id)) {
              throw new Error(`Duplicate outside vector id: ${vector.id}`);
            }
            outsideIds.add(vector.id);
            if (vector.mode !== "v2_snip12") {
              throw new Error(`Unexpected outside mode for ${vector.id}: ${vector.mode}`);
            }
          }

          const sessionIds = new Set();
          let hasV1 = false;
          let hasV2 = false;
          let hasValid = false;
          let hasInvalid = false;
          for (const vector of data.sessionVectors) {
            if (sessionIds.has(vector.id)) {
              throw new Error(`Duplicate session vector id: ${vector.id}`);
            }
            sessionIds.add(vector.id);
            hasV1 = hasV1 || vector.mode === "v1_legacy";
            hasV2 = hasV2 || vector.mode === "v2_snip12";
            hasValid = hasValid || vector.status === "valid";
            hasInvalid = hasInvalid || vector.status === "invalid";
          }

          if (!hasV1 || !hasV2) {
            throw new Error("sessionVectors must contain both v1_legacy and v2_snip12");
          }
          if (!hasValid || !hasInvalid) {
            throw new Error("sessionVectors must contain valid and invalid vectors");
          }

          for (const vector of data.vectors) {
            if (vector.domain.name !== "Account.execute_from_outside") {
              throw new Error(`Unexpected outside domain.name for ${vector.id}: ${vector.domain.name}`);
            }
            if (!Array.isArray(vector.message.calls) || vector.message.calls.length === 0) {
              throw new Error(`Outside vector ${vector.id} has no calls`);
            }
          }
          console.log(
            `Validated ${data.vectors.length} outside vectors and ${data.sessionVectors.length} session vectors`,
          );
          EOF_JS

  parity_with_agentic:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Compare vectors with starknet-agentic main
        run: |
          set -euo pipefail

          fetch_or_skip_404() {
            local url="$1"
            local out="$2"
            local label="$3"
            local http_status
            if ! http_status="$(curl -sSLo "$out" -w '%{http_code}' \
              --retry 3 --retry-delay 2 --retry-all-errors \
              --connect-timeout 10 --max-time 30 \
              "$url")"; then
              echo "::error::Failed to fetch ${label} due to network/transport error."
              return 1
            fi
            if [ "$http_status" = "404" ]; then
              echo "::warning::${label} not published yet on main; parity check skipped."
              echo "${label} not published yet on main; skipping parity check."
              return 2
            fi
            if [ "$http_status" != "200" ]; then
              echo "::error::Failed to fetch ${label} (HTTP ${http_status})."
              return 1
            fi
            return 0
          }

          fetch_status=0
          fetch_or_skip_404 \
            "https://raw.githubusercontent.com/keep-starknet-strange/starknet-agentic/main/spec/session-signature-v2.schema.json" \
            "/tmp/agentic-session-signature-v2.schema.json" \
            "starknet-agentic schema" || fetch_status=$?
          if [ "$fetch_status" -eq 2 ]; then
            exit 0
          fi
          if [ "$fetch_status" -ne 0 ]; then
            exit "$fetch_status"
          fi

          fetch_status=0
          fetch_or_skip_404 \
            "https://raw.githubusercontent.com/keep-starknet-strange/starknet-agentic/main/spec/session-signature-v2.json" \
            "/tmp/agentic-session-signature-v2.json" \
            "starknet-agentic vector file" || fetch_status=$?
          if [ "$fetch_status" -eq 2 ]; then
            exit 0
          fi
          if [ "$fetch_status" -ne 0 ]; then
            exit "$fetch_status"
          fi

          schema_filter='del(.["$id"], .properties.derivation, .["$defs"].derivation) | (.required //= []) | .required |= map(select(. != "derivation")) | .properties.sessionVectors.minItems = 1'
          if ! jq -e '.["$defs"]?.sessionVector? // {} | has("allOf")' /tmp/agentic-session-signature-v2.schema.json > /dev/null; then
            echo "::warning::upstream schema lacks sessionVector.allOf; parity diff ignores local allOf until upstream catches up."
            schema_filter="$schema_filter | .[\"\$defs\"].sessionVector |= del(.allOf)"
          fi
          if ! jq -e '.["$defs"]?.outsideExecutionDomain?.properties?.name? // {} | has("const")' /tmp/agentic-session-signature-v2.schema.json > /dev/null; then
            echo "::warning::upstream schema lacks outsideExecutionDomain.name const; parity diff ignores local const until upstream catches up."
            schema_filter="$schema_filter | .[\"\$defs\"].outsideExecutionDomain.properties.name = {\"type\":\"string\",\"minLength\":1}"
          fi

          jq -S "$schema_filter" /tmp/agentic-session-signature-v2.schema.json > /tmp/agentic-session-signature-v2.schema.normalized.json
          jq -S "$schema_filter" spec/session-signature-v2.schema.json > /tmp/local-session-signature-v2.schema.normalized.json
          diff -u /tmp/agentic-session-signature-v2.schema.normalized.json /tmp/local-session-signature-v2.schema.normalized.json

          jq -S '
            (.vectors //= [])
            | (.sessionVectors //= [])
            | del(
                .vectors[].expected.signature,
                .derivation,
                .sessionVectors[].expected.signingDomainHash,
                .sessionVectors[].expected.verificationDomainHash
              )
            | .vectors |= sort_by(.id)
            | .sessionVectors |= sort_by(.id)
          ' /tmp/agentic-session-signature-v2.json > /tmp/agentic-session-signature-v2.normalized.json
          jq -S '
            (.vectors //= [])
            | (.sessionVectors //= [])
            | del(
                .vectors[].expected.signature,
                .derivation,
                .sessionVectors[].expected.signingDomainHash,
                .sessionVectors[].expected.verificationDomainHash
              )
            | .vectors |= sort_by(.id)
            | .sessionVectors |= sort_by(.id)
          ' spec/session-signature-v2.json > /tmp/local-session-signature-v2.normalized.json
          diff -u /tmp/agentic-session-signature-v2.normalized.json /tmp/local-session-signature-v2.normalized.json
